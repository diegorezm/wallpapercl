<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/main.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpapercl</title>
  <script type="module" src="/src/main.ts" defer></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>

  <section class="actions__container">
    <div class="files__wrapper">
      <button class="action__button" open-folder-button>
        <ion-icon name="folder-open-outline"></ion-icon>
      </button>
    </div>

    <div class="search__wrapper">
      <input placeholder="Search for any wallpaper..."  id="search" wallpaper-search>
    </div>

    <div class="refresh__wrapper">
      <button class="action__button" refresh-button>
        <ion-icon name="refresh-outline"></ion-icon>
      </button>
    </div>
  </section>

  <div class="wallpaper__container" wallpaper-container />
  <div class="wallpaper__wrapper" wallpaper-template>
    <img src="" alt="" wallpaper-image>
  </div>

</body>

</html>
