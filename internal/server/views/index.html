{{template "layout.html" .}}

{{define "content"}}

<h1 class="text-3xl font-bold text-primary-content">WallpaperCL</h1>

<nav class="w-full mx-auto flex items-center justify-center join">
  <input type="text" class="input input-bordered w-full max-w-2xl join-item rounded-l-md" id="search-input"
    placeholder="Enter your search...">
  <select class="select select-bordered join-item rounded-r-md" id="mode-selection">
  </select>
</nav>

<ul
  class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3 place-items-center w-full mx-auto border border-neutral rounded-lg p-4"
  id="wallpaper-list">
</ul>
{{end}}
